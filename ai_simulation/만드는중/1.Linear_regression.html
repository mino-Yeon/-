<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선형회귀 — AI 개념 시뮬레이터</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FFFFFF;
      color: #1A1A1A;
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      padding: 40px 24px 80px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* ── 헤더 ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #6B7280;
      text-decoration: none;
      margin-bottom: 28px;
      transition: color 0.15s;
    }
    .back-link:hover { color: #1A1A1A; }
    .back-link svg { flex-shrink: 0; }

    .header { margin-bottom: 32px; }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 15px;
      font-weight: 400;
      color: #6B7280;
    }

    /* ── 메인 레이아웃 ── */
    .main-row {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    /* ── 캔버스 ── */
    .canvas-wrap {
      flex: 1;
      position: relative;
    }
    .canvas-hint {
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 8px;
      height: 18px;
    }
    #mainCanvas {
      display: block;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      cursor: crosshair;
      background: #FAFAFA;
    }

    /* ── MSE 수치판 ── */
    .mse-panel {
      width: 180px;
      flex-shrink: 0;
      margin-top: 26px;
    }
    .mse-card {
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      padding: 20px 18px 18px;
      background: #FAFAFA;
    }
    .mse-label {
      font-size: 12px;
      font-weight: 500;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .mse-value {
      font-size: 32px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
      color: #6366F1;
      line-height: 1;
      margin-bottom: 14px;
      letter-spacing: -1px;
    }
    .mse-value.dash { color: #D1D5DB; font-size: 28px; }
    .mse-tooltip {
      font-size: 12px;
      color: #9CA3AF;
      line-height: 1.5;
      border-top: 1px solid #E5E7EB;
      padding-top: 12px;
    }

    /* ── 슬라이더 패널 ── */
    .slider-panel {
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      padding: 22px 24px;
      margin-bottom: 20px;
      background: #FAFAFA;
    }
    .slider-panel-hint {
      font-size: 13px;
      color: #6B7280;
      margin-bottom: 20px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .slider-row:last-child { margin-bottom: 0; }
    .slider-name {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      width: 80px;
      flex-shrink: 0;
    }
    .slider-name span {
      font-size: 11px;
      color: #9CA3AF;
      font-weight: 400;
      display: block;
    }
    input[type="range"] {
      flex: 1;
      height: 4px;
      accent-color: #2563EB;
      cursor: pointer;
    }
    .slider-val {
      font-size: 14px;
      font-weight: 500;
      font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
      color: #1A1A1A;
      width: 52px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── 버튼 행 ── */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .btn {
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.08s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: #1A1A1A;
      color: #FFFFFF;
    }
    .btn-primary:hover { background: #374151; }
    .btn-secondary {
      background: #F3F4F6;
      color: #374151;
    }
    .btn-secondary:hover { background: #E5E7EB; }

    .btn-note {
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 40px;
      padding-left: 2px;
    }

    /* ── 하단 설명 ── */
    .footer-desc {
      border-top: 1px solid #F3F4F6;
      padding-top: 32px;
      max-width: 640px;
    }
    .footer-desc h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1A1A1A;
    }
    .footer-desc p {
      font-size: 14px;
      color: #6B7280;
      line-height: 1.7;
    }

    /* ── 상태 메시지 ── */
    #statusMsg {
      font-size: 12px;
      color: #F59E0B;
      height: 16px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- 헤더 -->
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    목록으로
  </a>

  <div class="header">
    <h1>선형회귀</h1>
    <p>흩어진 점들을 가장 잘 설명하는 선을 찾는 것</p>
  </div>

  <!-- 캔버스 + MSE 수치판 -->
  <div class="main-row">
    <div class="canvas-wrap">
      <div class="canvas-hint" id="canvasHint">캔버스를 클릭해서 점을 찍어보세요</div>
      <canvas id="mainCanvas" width="720" height="420"></canvas>
      <div id="statusMsg"></div>
    </div>

    <div class="mse-panel">
      <div class="mse-card">
        <div class="mse-label">MSE</div>
        <div class="mse-value dash" id="mseValue">—</div>
        <div class="mse-tooltip">MSE: 각 점과 선 사이 거리의 평균. 낮을수록 선이 점들을 잘 설명합니다</div>
      </div>
    </div>
  </div>

  <!-- 슬라이더 패널 -->
  <div class="slider-panel">
    <div class="slider-panel-hint">슬라이더로 선을 직접 움직여보세요. MSE가 어떻게 변하나요?</div>
    <div class="slider-row">
      <div class="slider-name">기울기<span>slope</span></div>
      <input type="range" id="slopeSlider" min="-5.0" max="5.0" step="0.1" value="0" />
      <div class="slider-val" id="slopeVal">0.0</div>
    </div>
    <div class="slider-row">
      <div class="slider-name">절편<span>intercept</span></div>
      <input type="range" id="interceptSlider" min="-300" max="300" step="1" value="0" />
      <div class="slider-val" id="interceptVal">0</div>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="btn-row">
    <button class="btn btn-primary" id="btnOptimal">최적선 보기</button>
    <button class="btn btn-secondary" id="btnReset">초기화</button>
  </div>
  <div class="btn-note" id="btnNote"></div>

  <!-- 하단 설명 -->
  <div class="footer-desc">
    <p>선형회귀를 푸는 방법은 두 가지입니다 — 정규방정식(한 번에 계산)과 경사하강법(조금씩 찾아가기). 다음 페이지에서 경사하강법을 직접 체험해보세요.</p>
  </div>

</div>

<script>
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // ── 상태 ──
  let points = [];
  let slope = 0;
  let intercept = 0;
  let optimalSlope = 0;
  let optimalIntercept = 0;
  let sliderMode = false; // 슬라이더를 직접 조작 중인지

  // ── DOM 요소 ──
  const slopeSlider = document.getElementById('slopeSlider');
  const interceptSlider = document.getElementById('interceptSlider');
  const slopeVal = document.getElementById('slopeVal');
  const interceptVal = document.getElementById('interceptVal');
  const mseEl = document.getElementById('mseValue');
  const statusMsg = document.getElementById('statusMsg');

  // ── 좌표 변환 ──
  // 캔버스 px ↔ 데이터 공간 (0~1 정규화)
  // 데이터 공간: x ∈ [0, W], y ∈ [0, H] (그대로 px 사용, 기울기도 px 기준)
  // 회귀선은 px 좌표 기준으로 계산

  function computeOptimal() {
    const n = points.length;
    if (n < 2) return null;
    const xs = points.map(p => p.x);
    const ys = points.map(p => p.y);
    const meanX = xs.reduce((a, b) => a + b, 0) / n;
    const meanY = ys.reduce((a, b) => a + b, 0) / n;
    const ssXX = xs.reduce((acc, x) => acc + (x - meanX) ** 2, 0);
    const ssXY = xs.reduce((acc, x, i) => acc + (x - meanX) * (ys[i] - meanY), 0);
    if (ssXX === 0) return null; // 수직 일직선
    const s = ssXY / ssXX;
    const b = meanY - s * meanX;
    return { slope: s, intercept: b };
  }

  function computeMSE(s, b) {
    if (points.length < 2) return null;
    const sum = points.reduce((acc, p) => {
      const pred = s * p.x + b;
      return acc + (p.y - pred) ** 2;
    }, 0);
    return sum / points.length;
  }

  // ── 그리기 ──
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // 그리드 (연한)
    ctx.strokeStyle = '#F0F0F0';
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x += 72) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y <= H; y += 60) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    if (points.length < 2) {
      // 오차선/회귀선 없음
      drawPoints();
      return;
    }

    // 오차선 (residuals)
    ctx.strokeStyle = '#D1D5DB';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    points.forEach(p => {
      const pred = slope * p.x + intercept;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x, pred);
      ctx.stroke();
    });
    ctx.setLineDash([]);

    // 회귀선
    ctx.strokeStyle = '#DC2626';
    ctx.lineWidth = 2.2;
    const x0 = 0, x1 = W;
    const y0 = slope * x0 + intercept;
    const y1 = slope * x1 + intercept;
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();

    drawPoints();
  }

  function drawPoints() {
    points.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#2563EB';
      ctx.fill();
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });
  }

  function updateMSE() {
    const mse = computeMSE(slope, intercept);
    if (mse === null) {
      mseEl.textContent = '—';
      mseEl.classList.add('dash');
    } else {
      mseEl.textContent = mse.toFixed(2);
      mseEl.classList.remove('dash');
    }
  }

  function syncSliders() {
    slopeSlider.value = slope;
    interceptSlider.value = intercept;
    slopeVal.textContent = parseFloat(slope).toFixed(1);
    interceptVal.textContent = Math.round(intercept);
  }

  function refreshAfterPointChange() {
    const opt = computeOptimal();
    if (opt) {
      optimalSlope = opt.slope;
      optimalIntercept = opt.intercept;
      // 점 추가 시 자동으로 최적선 표시
      slope = optimalSlope;
      intercept = optimalIntercept;
      syncSliders();
    } else {
      slope = parseFloat(slopeSlider.value);
      intercept = parseFloat(interceptSlider.value);
    }
    updateMSE();
    draw();
  }

  // ── 클릭으로 점 추가 ──
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    if (x < 0 || x > W || y < 0 || y > H) return;

    if (points.length >= 20) {
      showStatus('최대 20개까지 찍을 수 있어요');
      return;
    }

    points.push({ x, y });
    clearStatus();

    if (points.length === 1) {
      showStatus('점을 2개 이상 찍어보세요');
    }

    refreshAfterPointChange();
  });

  // ── 슬라이더 조작 ──
  slopeSlider.addEventListener('input', () => {
    slope = parseFloat(slopeSlider.value);
    slopeVal.textContent = slope.toFixed(1);
    updateMSE();
    draw();
  });
  interceptSlider.addEventListener('input', () => {
    intercept = parseFloat(interceptSlider.value);
    interceptVal.textContent = Math.round(intercept);
    updateMSE();
    draw();
  });

  // ── 최적선 보기 ──
  document.getElementById('btnOptimal').addEventListener('click', () => {
    if (points.length < 2) {
      showStatus('점을 2개 이상 찍어보세요');
      return;
    }
    const opt = computeOptimal();
    if (!opt) {
      showStatus('수직 일직선 — 계산 불가');
      return;
    }
    // 슬라이더 범위 내로 클램프
    slope = Math.max(-5.0, Math.min(5.0, opt.slope));
    intercept = Math.max(-300, Math.min(300, opt.intercept));
    optimalSlope = slope;
    optimalIntercept = intercept;
    syncSliders();
    updateMSE();
    draw();
    clearStatus();
    document.getElementById('btnNote').textContent = '정규방정식: 오차가 가장 작은 기울기와 절편을 수식으로 한 번에 계산하는 방법';
  });

  // ── 초기화 ──
  document.getElementById('btnReset').addEventListener('click', () => {
    points = [];
    slope = 0;
    intercept = 0;
    optimalSlope = 0;
    optimalIntercept = 0;
    syncSliders();
    mseEl.textContent = '—';
    mseEl.classList.add('dash');
    clearStatus();
    document.getElementById('btnNote').textContent = '';
    draw();
  });

  // ── 상태 메시지 ──
  let statusTimer = null;
  function showStatus(msg) {
    statusMsg.textContent = msg;
    clearTimeout(statusTimer);
    statusTimer = setTimeout(clearStatus, 3000);
  }
  function clearStatus() {
    statusMsg.textContent = '';
  }

  // ── 초기 렌더 ──
  syncSliders();
  draw();
</script>
</body>
</html>
