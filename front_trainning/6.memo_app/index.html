<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모 앱</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>메모장</h2>

    <div id="memo-app">
      <form id="memo-form">
        <input type="text" id="memo-title" placeholder="제목 입력" />
        <textarea id="memo-content" placeholder="메모를 작성하세요" rows="4" cols="30"></textarea>
        <button type="submit">메모 추가</button>
      </form>
      <ul id="memo-list">
	      <li class="memo-item">
				  <h3 class="memo-title">회의 내용 정리</h3>
				  <p class="memo-content">
				    오늘 회의에서 논의된 주요 안건과 다음 일정에 대해 정리했습니다. 팀원 모두 확인 부탁드립니다.
				  </p>
				  <span class="memo-time">2025-08-11 15:00:25</span>
				  <button class="memo-del-btn">삭제</button>
				</li>
      </ul>
    </div>
    <script src="memo.js"></script>
  </body>
</html>
