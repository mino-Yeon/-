<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DOM 학습용 기본 문서</title>
</head>
<body>

  <!-- 전체 래퍼 -->
  <div id="app" class="container">

    <!-- 헤더 영역 -->
    <header id="main-header" class="section header-area">
      <h1 class="title">DOM 학습 페이지</h1>
      <p class="description" data-role="intro">
        이 문서는 DOM 실습을 위해 만들어졌습니다.
      </p>
    </header>

    <!-- 메인 콘텐츠 -->
    <main id="main-content" class="section content-area">

      <!-- 공지 영역 -->
      <section id="notice-section" class="card highlight">
        <h2 class="card-title">공지사항</h2>

        <!-- ul > li 구조 (추가/제거 실습용) -->
        <ul id="notice-list" class="list">
          <li class="item" data-id="1">첫 번째 공지</li>
          <li class="item important" data-id="2">두 번째 공지</li>
          <li class="item" data-id="3">세 번째 공지</li>
        </ul>
      </section>

      <!-- 사용자 카드 영역 -->
      <section id="user-section" class="card">
        <h2 class="card-title">사용자 정보</h2>

        <!-- depth 3 이상 구조 -->
        <div class="user-card" data-user="admin">
          <div class="user-info">
            <span class="label">이름:</span>
            <span class="value name">홍길동</span>
          </div>

          <div class="user-info">
            <span class="label">역할:</span>
            <span class="value role">관리자</span>
          </div>
        </div>
      </section>

      <!-- 빈 컨테이너 (createElement 실습용) -->
      <section id="dynamic-section" class="card">
        <h2 class="card-title">동적 생성 영역</h2>
        <div id="dynamic-container" class="dynamic-box">
          <!-- JS로 노드 추가 예정 -->
        </div>
      </section>

    </main>

    <!-- 푸터 -->
    <footer id="main-footer" class="section footer-area">
      <p class="footer-text">© 2026 DOM Study</p>
    </footer>

  </div>

</body>
</html>
