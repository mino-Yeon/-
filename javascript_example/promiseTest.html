<button onclick="syncRequest()">동기 요청</button>
<button onclick="getAllUsers()">모든 유저</button>
<button onclick="getAllPostsByUserId(1)">1번 유저 작성글</button>
<button onclick="getAllCommentsByPostId(15)">15번 게시글의 댓글들</button>

<script>

        const xhr = new XMLHttpRequest();
        xhr.open("GET", "https://httpbin.org/delay/2", true);
        xhr.onload = () => {
            const res = JSON.parse(xhr.responseText);
            console.log("응답:",res);
        }
        xhr.send();

    function syncRequest() {
        const xhr1 = new XMLHttpRequest();
        xhr1.open("GET", "https://dummyjson.com/users", true);
        xhr1.onload = () => {
            const res = JSON.parse(xhr1.responseText);
            console.log("유저들:", res.users);

            const xhr2 = new XMLHttpRequest();
            xhr2.open("GET", `https://dummyjson.com/posts/user/${res.users[0].id}`, true);
            xhr2.onload = () => {
                const res = JSON.parse(xhr2.responseText);
                console.log("게시글:", res.posts);

                const xhr3 = new XMLHttpRequest();
                xhr3.open("GET",  `https://dummyjson.com/posts/${res.posts[0].id}/comments`, true);
                xhr3.onload = () => {
                    const res = JSON.parse(xhr3.responseText);
                    console.log("댓글:", res.comments);
                };
                xhr3.send();
            };
            xhr2.send();
        };
        xhr1.send();
    }

    function getAllUsers(){
        const xhr = new XMLHttpRequest();
        xhr.open("GET", "https://dummyjson.com/users", true);
        xhr.onload = () => {
            const res = JSON.parse(xhr.responseText);
            console.log("유저들:", res.users);
        }
        xhr.send();
    }

    function getAllPostsByUserId(userId){
        const xhr = new XMLHttpRequest();
        xhr.open("GET", `https://dummyjson.com/posts/user/${userId}`, true);
        xhr.onload = () => {
            const res = JSON.parse(xhr.responseText);
            console.log("게시글:", res.posts);
        }
        xhr.send();
    }

    function getAllCommentsByPostId(postId){
        const xhr = new XMLHttpRequest();
        xhr.open("GET", `https://dummyjson.com/posts/${postId}/comments`, true);
        xhr.onload = () => {
            const res = JSON.parse(xhr.responseText);
            console.log("댓글:", res.comments);
        }
        xhr.send();
    }


</script>
